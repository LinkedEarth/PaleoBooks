name: Submission Issue to CSV

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  issue-to-csv:
    if: contains(github.event.issue.labels.*.name, 'gallery submission')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run issue parser
        id: run_script
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python scripts/issue_to_cookbook_csv.py 2>&1 | tee /tmp/issue_to_csv_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Comment on issue when script fails
        if: steps.run_script.outputs.exit_code != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/issue_to_csv_output.txt', 'utf8').trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.length ? body : 'Submission parsing failed with no output.'
            });

      - name: Stop on script failure
        if: steps.run_script.outputs.exit_code != '0'
        run: exit 1

      - name: Check for CSV changes
        id: csv_diff
        shell: bash
        run: |
          if git status --porcelain doc/cookbook_gallery.csv | grep -q .; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.csv_diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update cookbook gallery from gallery submission issue"
          title: "Update cookbook gallery from  gallery submission issue"
          body: |
            Updates `doc/cookbook_gallery.csv` from submission issue #${{ github.event.issue.number }}.

            Source: ${{ github.event.issue.html_url }}
          branch: "codex/submission-issue-${{ github.event.issue.number }}"
          delete-branch: true
